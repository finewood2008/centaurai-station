# Lightweight distributed-CLIENT build variant.
# Differs from electron-builder.yml only by: client app id/name, shipping a
# `client-mode.flag` marker (so it launches in client mode), and EXCLUDING the
# aioncore backend binary + hub (clients connect to a remote server, so they
# don't need a local backend — this drops ~157MB). Keep in sync with the base
# config for any shared `files`/target changes.
appId: com.centaurai.client
productName: CentaurAI Client
executableName: CentaurAI Client
copyright: Copyright © 2026 半人马人工智能（深圳）有限公司

protocols:
  - name: CentaurAI Protocol
    schemes:
      - aionui

asar:
  smartUnpack: true

directories:
  app: .
  output: out
  buildResources: resources

files:
  - out/main/**/*
  - out/preload/**/*
  - out/renderer/**/*
  - public/**/*
  - package.json
  - node_modules/better-sqlite3/**/*
  - node_modules/bcrypt/**/*
  - node_modules/node-pty/**/*
  - node_modules/@mapbox/**/*
  - node_modules/detect-libc/**/*
  - node_modules/prebuild-install/**/*
  - node_modules/node-gyp-build/**/*
  - node_modules/bindings/**/*
  - node_modules/@isaacs/cliui/**/*
  - node_modules/ansi-regex/**/*
  - node_modules/ansi-styles/**/*
  - node_modules/strip-ansi/**/*
  - node_modules/wrap-ansi/**/*
  - node_modules/string-width/**/*
  - node_modules/eastasianwidth/**/*
  - node_modules/emoji-regex/**/*
  - node_modules/open/**/*
  - node_modules/default-browser/**/*
  - node_modules/default-browser-id/**/*
  - node_modules/run-applescript/**/*
  - node_modules/bundle-name/**/*
  - node_modules/web-tree-sitter/**/*
  - node_modules/tree-sitter-bash/**/*
  - '!**/node_modules/tree-sitter-*/prebuilds/**'
  - '!**/node_modules/tree-sitter-*/build/**'
  - '!**/node_modules/tree-sitter-*/src/**'
  - '!**/node_modules/tree-sitter-*/**/*.node'
  - '!**/node_modules/tree-sitter-*/**/*.obj'
  - '!**/node_modules/tree-sitter-*/**/*.o'
  - '!**/node_modules/tree-sitter-*/**/*.cc'
  - '!**/node_modules/tree-sitter-*/**/*.c'
  - '!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}'
  - '!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}'
  - '!**/node_modules/*/{*.test.js,*.spec.js,*.test.ts,*.spec.ts}'
  - '!packages/web-host/**'
  - '!packages/web-cli/**'
  - '!packages/shared-scripts/**'
  - '!packages/desktop/src/**'
  - '!**/node_modules/*.d.ts'
  - '!**/node_modules/.bin'
  - '!**/node_modules/*/{docs,documentation,doc}'
  - '!**/{.DS_Store,.git,.gitignore,.gitattributes}'
  - '!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}'
  - '!**/{appveyor.yml,.travis.yml,circle.yml}'
  - '!**/{npm-debug.log,yarn.lock,.yarn-metadata.json,yarn-error.log}'
  - '!**/node_modules/{@img,@emnapi}/**'
  - '!**/node_modules/@img/sharp-*/**'
  - '!**/node_modules/@anthropic-ai/claude-code/vendor/**'
  - '!**/node_modules/@anthropic-ai/claude-agent-sdk/vendor/**'
  - '!**/*.jar'
  - '!**/*.jnilib'
  - '!**/node_modules/*/vendor/**'
  - '!**/node_modules/@*/*/vendor/**'
  - 'node_modules/better-sqlite3/vendor/**'
  - 'node_modules/bcrypt/vendor/**'
  - 'node_modules/node-pty/vendor/**'
  - '!**/*.map'
  - '!**/out/**/react-syntax-highlighter_languages_highlight_*'
  - 'out/**/react-syntax-highlighter_languages_highlight_{javascript,typescript,python,java,cpp,c,html,css,json,xml,yaml,shell,bash,dockerfile,sql,markdown,go,rust,php}'
  - 'out/renderer/**/vendor-*.js'
  - from: out/main/static
    to: static

# Client variant: NO bundled-aioncore / hub (saves ~157MB); ship the client marker.
extraResources:
  - from: public
    to: .
  - from: resources/app.png
    to: app.png
  - from: resources/client-mode.flag
    to: client-mode.flag

win:
  target:
    - nsis
    - zip
  icon: resources/app.ico
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  differentialPackage: false

mac:
  target:
    - dmg
    - zip
  icon: resources/app.icns
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.plist
  entitlementsInherit: entitlements.plist

dmg:
  format: UDZO
  internetEnabled: false
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 180
      type: file
    - x: 400
      y: 180
      type: link
      path: /Applications

afterPack: scripts/afterPack.js
afterSign: scripts/afterSign.js

linux:
  target:
    - deb
  icon: resources/app.png
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  category: Utility
  maintainer: centaurai
  vendor: CentaurAI
  synopsis: ${description}
  description: ${description}
  desktop:
    entry:
      Name: CentaurAI Client
      Comment: ${description}
      Icon: centaurai
      Categories: Office;Utility;
      MimeType: x-scheme-handler/aionui;

npmRebuild: false
buildDependenciesFromSource: false
nodeGypRebuild: false

asarUnpack:
  - '**/node_modules/better-sqlite3/**/*'
  - '**/node_modules/bcrypt/**/*'
  - '**/node_modules/node-pty/**/*'
  - '**/node_modules/@mapbox/**/*'
  - '**/node_modules/detect-libc/**/*'
  - '**/node_modules/prebuild-install/**/*'
  - '**/node_modules/node-gyp-build/**/*'
  - '**/node_modules/bindings/**/*'
  - '**/node_modules/open/**/*'
  - '**/node_modules/default-browser/**/*'
  - '**/node_modules/default-browser-id/**/*'
  - '**/node_modules/run-applescript/**/*'
  - '**/node_modules/bundle-name/**/*'
  - '**/node_modules/web-tree-sitter/**/*'
  - '**/node_modules/tree-sitter-bash/**/*'
  - 'out/main/builtin-mcp-image-gen.js'
  - 'out/main/team-mcp-stdio.js'
  - 'out/main/team-guide-mcp-stdio.js'

compression: normal
removePackageScripts: true
electronDownload:
  cache: ${env.ELECTRON_CACHE}
