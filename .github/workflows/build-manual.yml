name: '🔨 Manual Build'

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'
        type: string
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - macos-arm64
          - macos-x64
          - windows-x64
          - windows-arm64
          - linux-x64
          - linux-arm64
          - all
        default: 'macos-arm64'
      edition:
        description: 'Product edition: decision (决策版) or team (团队版); default keeps the base build'
        required: false
        type: choice
        options:
          - default
          - decision
          - team
        default: 'default'
      skip_code_quality:
        description: 'Skip code quality checks (faster builds for debugging)'
        required: false
        type: boolean
        default: false
      client:
        description: 'Build the lightweight CLIENT variant (no aioncore backend, launches in client mode)'
        required: false
        type: boolean
        default: false

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  prepare-matrix:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Generate build matrix
        id: set-matrix
        shell: bash
        run: |
          PLATFORM="${{ inputs.platform }}"

          # Edition variant: pick the edition builder-config, tag artifacts, and bake
          # AIONUI_EDITION into the command (via cross-env, portable across runners).
          CFG=""
          SUF=""
          ENVP=""
          if [ "${{ inputs.edition }}" = "decision" ]; then
            CFG=" --builder-config packages/desktop/electron-builder.decision.yml"
            SUF="-decision"
            ENVP="bunx cross-env AIONUI_EDITION=decision "
          elif [ "${{ inputs.edition }}" = "team" ]; then
            CFG=" --builder-config packages/desktop/electron-builder.team.yml"
            SUF="-team"
            ENVP="bunx cross-env AIONUI_EDITION=team "
          fi

          # Client variant overrides edition: lightweight no-backend client build.
          if [ "${{ inputs.client }}" = "true" ]; then
            CFG=" --builder-config packages/desktop/electron-builder.client.yml"
            SUF="-client"
            ENVP=""
          fi

          MACOS_ARM64='{"platform":"macos-arm64","os":"macos-14","command":"'"$ENVP"'node scripts/build-with-builder.js arm64 --mac --arm64'"$CFG"'","artifact-name":"macos-build-arm64'"$SUF"'","arch":"arm64"}'
          MACOS_X64='{"platform":"macos-x64","os":"macos-14","command":"'"$ENVP"'node scripts/build-with-builder.js x64 --mac --x64'"$CFG"'","artifact-name":"macos-build-x64'"$SUF"'","arch":"x64"}'
          WINDOWS_X64='{"platform":"windows-x64","os":"windows-2022","command":"'"$ENVP"'node scripts/build-with-builder.js x64 --win --x64'"$CFG"'","artifact-name":"windows-build-x64'"$SUF"'","arch":"x64"}'
          WINDOWS_ARM64='{"platform":"windows-arm64","os":"windows-11-arm","command":"'"$ENVP"'node scripts/build-with-builder.js arm64 --win --arm64'"$CFG"'","artifact-name":"windows-build-arm64'"$SUF"'","arch":"arm64"}'
          LINUX_X64='{"platform":"linux-x64","os":"ubuntu-latest","command":"'"$ENVP"'node scripts/build-with-builder.js x64 --linux --x64'"$CFG"'","artifact-name":"linux-build-x64'"$SUF"'","arch":"x64"}'
          LINUX_ARM64='{"platform":"linux-arm64","os":"ubuntu-24.04-arm","command":"'"$ENVP"'node scripts/build-with-builder.js arm64 --linux --arm64'"$CFG"'","artifact-name":"linux-build-arm64'"$SUF"'","arch":"arm64"}'

          if [ "$PLATFORM" = "all" ]; then
            MATRIX="{\"include\":[$MACOS_ARM64,$MACOS_X64,$WINDOWS_X64,$WINDOWS_ARM64,$LINUX_X64,$LINUX_ARM64]}"
          elif [ "$PLATFORM" = "macos-arm64" ]; then
            MATRIX="{\"include\":[$MACOS_ARM64]}"
          elif [ "$PLATFORM" = "macos-x64" ]; then
            MATRIX="{\"include\":[$MACOS_X64]}"
          elif [ "$PLATFORM" = "windows-x64" ]; then
            MATRIX="{\"include\":[$WINDOWS_X64]}"
          elif [ "$PLATFORM" = "windows-arm64" ]; then
            MATRIX="{\"include\":[$WINDOWS_ARM64]}"
          elif [ "$PLATFORM" = "linux-x64" ]; then
            MATRIX="{\"include\":[$LINUX_X64]}"
          elif [ "$PLATFORM" = "linux-arm64" ]; then
            MATRIX="{\"include\":[$LINUX_ARM64]}"
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Generated matrix for platform '$PLATFORM':"
          echo "$MATRIX" | python3 -m json.tool

  build-pipeline:
    needs: prepare-matrix
    uses: ./.github/workflows/_build-reusable.yml
    with:
      matrix: ${{ needs.prepare-matrix.outputs.matrix }}
      ref: ${{ inputs.branch }}
      skip_code_quality: ${{ inputs.skip_code_quality }}
      append_commit_hash: true
      upload_installers_only: true
    secrets: inherit
