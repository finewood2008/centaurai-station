<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
         working: whole-sprite typing bob + a floating laptop/screen overlay
         in front of the torso with flashing green typing dots. The sprite is a
         fixed pose, so the laptop floats near the hands to convey "typing". */
      .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
      .wk-all {
        transform-origin: 10.5px 12px;
        animation: wk-bob 0.6s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
      }
      .wk-shadow {
        transform-origin: 10.5px 22.8px;
        animation: wk-shadow 2.4s ease-in-out infinite;
      }
      .wk-laptop { animation: wk-laptop-bob 0.6s ease-in-out infinite; }
      .wk-dot1 { animation: wk-dot-flash 0.9s ease-in-out infinite; animation-delay: 0s; }
      .wk-dot2 { animation: wk-dot-flash 0.9s ease-in-out infinite; animation-delay: 0.3s; }
      .wk-dot3 { animation: wk-dot-flash 0.9s ease-in-out infinite; animation-delay: 0.6s; }
      .wk-dot4 { animation: wk-dot-flash 0.9s ease-in-out infinite; animation-delay: 0.15s; }
      @keyframes wk-bob {
        0%,100% { transform: translateY(0) scaleY(1); }
        30%     { transform: translateY(-1.2px) scaleY(1.02); }
        60%     { transform: translateY(0.6px) scaleY(0.99); }
      }
      @keyframes wk-laptop-bob {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(0.5px); }
      }
      @keyframes wk-shadow {
        0%,100% { transform: scaleX(1); opacity: 0.32; }
        50%     { transform: scaleX(0.95); opacity: 0.25; }
      }
      @keyframes wk-dot-flash {
        0%,100% { opacity: 1; transform: scale(1); }
        50%     { opacity: 0.1; transform: scale(0.6); }
      }
    </style>
  </defs>

  <ellipse class="wk-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="wk-all">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>

    <!-- floating laptop near the torso/hands + green typing dots -->
    <g class="wk-laptop">
      <!-- screen panel -->
      <rect x="13.5" y="9" width="6.4" height="3.7" rx="0.4" fill="#D9D9D9" stroke="#E5E7F0" stroke-width="0.4"/>
      <!-- code lines -->
      <rect x="14.2" y="9.8"  width="2.6" height="0.55" rx="0.2" fill="#9098b8" opacity="0.7"/>
      <rect x="14.2" y="10.7" width="3.8" height="0.55" rx="0.2" fill="#9098b8" opacity="0.5"/>
      <rect x="14.2" y="11.6" width="2"   height="0.55" rx="0.2" fill="#9098b8" opacity="0.6"/>
      <!-- keyboard base -->
      <rect x="13.0" y="12.7" width="7.6" height="1" rx="0.25" fill="#D9D9D9"/>
      <rect x="16.2" y="12.9" width="1" height="0.6" rx="0.15" fill="#736B6B" opacity="0.7"/>
      <!-- green typing dots (above the laptop, clear of the head) -->
      <rect class="wk-dot1" x="15.0" y="6.6" width="1" height="1" rx="0.3" fill="#4AFF3D"/>
      <rect class="wk-dot2" x="17.0" y="6.2" width="1" height="1" rx="0.3" fill="#4AFF3D"/>
      <rect class="wk-dot3" x="19.0" y="6.6" width="1" height="1" rx="0.3" fill="#4AFF3D"/>
      <rect class="wk-dot4" x="20.8" y="7.4" width="0.9" height="0.9" rx="0.25" fill="#4AFF3D"/>
    </g>
  </g>
</svg>
