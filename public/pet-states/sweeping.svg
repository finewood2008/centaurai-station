<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
       sweeping: the whole sprite sways side-to-side while a floating broom
       overlay swings near the hooves and dust puffs drift away. The sprite
       is a fixed pose, so the broom is a floating prop, not held. */
    .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
    .sw-body {
      transform-origin: 10.5px 12px;
      animation: sw-sway 0.7s ease-in-out infinite alternate;
    }
    .sw-broom {
      transform-origin: 6px 14px;
      animation: sw-broom 0.7s ease-in-out infinite alternate;
    }
    .sw-dust1 { animation: sw-dust 1.4s ease-out infinite; animation-delay: 0s; }
    .sw-dust2 { animation: sw-dust 1.4s ease-out infinite; animation-delay: 0.35s; }
    .sw-dust3 { animation: sw-dust 1.4s ease-out infinite; animation-delay: 0.7s; }
    .sw-shadow {
      transform-origin: 10.5px 22.8px;
      animation: sw-shadow 0.7s ease-in-out infinite alternate;
    }
    @keyframes sw-sway {
      from { transform: rotate(-4deg) scaleX(1.02); }
      to   { transform: rotate(4deg) translateY(-1px) scaleX(0.98); }
    }
    @keyframes sw-broom {
      from { transform: rotate(-13deg); }
      to   { transform: rotate(13deg); }
    }
    @keyframes sw-dust {
      0%   { transform: translate(0,0) scale(1); opacity: 0.8; }
      100% { transform: translate(-6px, -4px) scale(0.3); opacity: 0; }
    }
    @keyframes sw-shadow {
      from { transform: scaleX(1.1); opacity: 0.32; }
      to   { transform: scaleX(0.85); opacity: 0.22; }
    }
  </style></defs>

  <ellipse class="sw-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="sw-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>

  <!-- 扫帚（漂浮在蹄子附近，左右摆动） -->
  <g class="sw-broom">
    <!-- 扫帚柄 斜放 -->
    <rect x="7.6" y="9" width="1.1" height="9.5" rx="0.55" fill="#c8a96e" transform="rotate(-22 8.1 14)"/>
    <!-- 扫帚头（近地面） -->
    <rect x="2.2" y="18.5" width="8.6" height="2.5" rx="1" fill="#e0c070"/>
    <!-- 刷毛线条 -->
    <line x1="3.6" y1="19" x2="3.1" y2="21.5" stroke="#b89040" stroke-width="0.5"/>
    <line x1="5.2" y1="19" x2="4.9" y2="21.5" stroke="#b89040" stroke-width="0.5"/>
    <line x1="6.8" y1="19" x2="6.8" y2="21.5" stroke="#b89040" stroke-width="0.5"/>
    <line x1="8.4" y1="19" x2="8.7" y2="21.5" stroke="#b89040" stroke-width="0.5"/>
    <line x1="9.8" y1="19" x2="10.2" y2="21.5" stroke="#b89040" stroke-width="0.5"/>
  </g>

  <!-- 尘土粒子 -->
  <rect class="sw-dust1" x="2.5" y="20" width="1.5" height="1.5" rx="0.5" fill="#9098b0" opacity="0.7"/>
  <rect class="sw-dust2" x="0.8" y="19" width="1"   height="1"   rx="0.3" fill="#9098b0" opacity="0.6"/>
  <rect class="sw-dust3" x="3.5" y="18" width="0.8" height="0.8" rx="0.3" fill="#9098b0" opacity="0.5"/>
</svg>
