<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
         thinking: whole-sprite gentle breathe + a floating thought bubble
         with pulsing purple dots up-and-right of the head, plus drifting
         glow dots. Face is baked into the raster; mood comes from the props. */
      .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
      .think-body {
        transform-origin: 10.5px 12px;
        animation: think-breathe 3.2s ease-in-out infinite;
      }
      .thinking-shadow {
        transform-origin: 10.5px 22.8px;
        animation: thinking-shadow-pulse 3.2s ease-in-out infinite;
      }
      .think-bubble { animation: think-bubble-float 3s ease-in-out infinite; }
      .tpx1 { animation: think-dot 1.8s infinite 0s; }
      .tpx2 { animation: think-dot 1.8s infinite 0.35s; }
      .tpx3 { animation: think-dot 1.8s infinite 0.7s; }
      .tgl1 { animation: think-glow 2.5s ease-out infinite 0s;   opacity:0; }
      .tgl2 { animation: think-glow 2.5s ease-out infinite 0.8s; opacity:0; }
      .tgl3 { animation: think-glow 2.5s ease-out infinite 1.6s; opacity:0; }
      @keyframes think-breathe {
        0%,100% { transform: scaleY(1) translateY(0); }
        50%     { transform: scaleY(0.99) translateY(0.4px); }
      }
      @keyframes think-bubble-float {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-0.6px); }
      }
      @keyframes think-dot {
        0%,10%  { opacity:0; transform:scale(0.5); }
        35%,70% { opacity:1; transform:scale(1); }
        100%    { opacity:0; transform:scale(0.5); }
      }
      @keyframes think-glow {
        0%   { opacity:0;   transform:translate(0,0)    scale(1); }
        25%  { opacity:0.9; transform:translate(0.5px,-1px) scale(1); }
        100% { opacity:0;   transform:translate(2px,-7px)  scale(1.4); }
      }
      @keyframes thinking-shadow-pulse {
        0%,100% { transform: scaleX(1); opacity: 0.32; }
        50%     { transform: scaleX(0.96); opacity: 0.25; }
      }
    </style>
  </defs>

  <!-- floating glow dots around the centaur -->
  <rect class="tgl1" x="22" y="6"  width="1.5" height="1.5" rx="0.3" fill="#94BDFF"/>
  <rect class="tgl2" x="20" y="2"  width="1.2" height="1.2" rx="0.2" fill="#94BDFF"/>
  <rect class="tgl3" x="3"  y="9"  width="1.2" height="1.2" rx="0.2" fill="#94BDFF"/>

  <ellipse class="thinking-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="think-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>

  <!-- thought bubble up-and-right of the head -->
  <g class="think-bubble">
    <path d="M22.083 -3.084H23V2.416H22.083V3.333H12.917V2.416H12V-3.084H12.917V-4H22.083V-3.084Z" fill="white"/>
    <rect class="tpx1" x="14" y="-0.667" width="1" height="1" fill="#605AFF"/>
    <rect class="tpx2" x="17" y="-0.667" width="1" height="1" fill="#605AFF"/>
    <rect class="tpx3" x="20" y="-0.667" width="1" height="1" fill="#605AFF"/>
  </g>
</svg>
