<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
      .notif-body {
        transform-origin: 10.5px 21px;
        animation: notif-jump 3.5s ease-in-out infinite;
      }
      .notif-shadow {
        transform-origin: 10.5px 22.8px;
        animation: notif-shadow 3.5s ease-in-out infinite;
      }
      .notif-bell {
        transform-origin: 18px 1px;
        animation: notif-bell 3.5s ease-in-out infinite;
      }
      .notif-alert {
        transform-origin: 17px -4px;
        animation: notif-alert 3.5s ease-in-out infinite;
        opacity: 0;
      }
      @keyframes notif-jump {
        0%,100% { transform: translateY(0) scaleY(1); }
        8%      { transform: translateY(0) scaleY(0.9); }
        18%     { transform: translateY(-10px) scaleY(1.06); }
        26%     { transform: translateY(0) scaleY(0.91); }
        34%     { transform: translateY(-6px) scaleY(1.03); }
        40%     { transform: translateY(0) scaleY(0.94); }
        47%     { transform: translateY(-3px) scaleY(1.02); }
        53%     { transform: translateY(0) scaleY(0.97); }
        58%     { transform: translateY(-1px) scaleY(1.01); }
        63%,100%{ transform: translateY(0) scaleY(1); }
      }
      @keyframes notif-shadow {
        0%,100% { transform: scaleX(1); opacity: 0.35; }
        18%     { transform: scaleX(0.4); opacity: 0.08; }
        26%     { transform: scaleX(1.06); opacity: 0.42; }
        34%     { transform: scaleX(0.58); opacity: 0.16; }
        40%     { transform: scaleX(1); opacity: 0.35; }
        47%     { transform: scaleX(0.75); opacity: 0.24; }
      }
      @keyframes notif-bell {
        0%,100% { transform: rotate(0deg); }
        18%     { transform: rotate(18deg); }
        30%     { transform: rotate(-14deg); }
        42%     { transform: rotate(10deg); }
        54%     { transform: rotate(-6deg); }
        63%     { transform: rotate(0deg); }
      }
      @keyframes notif-alert {
        0%    { opacity: 0; transform: scale(0.2); }
        5%    { opacity: 1; transform: scale(1.4); }
        10%   { opacity: 1; transform: scale(1); }
        55%   { opacity: 1; transform: scale(1); }
        63%   { opacity: 0; transform: scale(0.4); }
        100%  { opacity: 0; }
      }
    </style>
  </defs>

  <!-- exclamation mark pop above-right of the head -->
  <g class="notif-alert" fill="#FF7A1A">
    <rect x="16" y="-9" width="2" height="5.5" rx="1"/>
    <rect x="16" y="-2" width="2" height="2" rx="1"/>
  </g>

  <ellipse class="notif-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="notif-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>

  <!-- ringing bell beside/above the head, with red badge -->
  <g class="notif-bell">
    <path d="M18 -3.4 C15.3 -3.4 14.5 -1.5 14.5 0.4 C14.5 1.8 14 2.4 13.4 3 L22.6 3 C22 2.4 21.5 1.8 21.5 0.4 C21.5 -1.5 20.7 -3.4 18 -3.4 Z" fill="#FFA64D" stroke="#E0601A" stroke-width="0.4"/>
    <rect x="17.2" y="-4.6" width="1.6" height="1.4" rx="0.7" fill="#E0601A"/>
    <ellipse cx="18" cy="4" rx="1.5" ry="1" fill="#FF7A1A"/>
    <!-- red unread badge -->
    <circle cx="22" cy="-3" r="1.8" fill="#E8362B"/>
  </g>
</svg>
