<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* CentaurAI pixel mascot — the artwork is a shared raster sprite
         (centaur.png); each state embeds it and animates the whole sprite.
         Idle keeps the cursor-lean contract: petRenderer writes an SVG
         transform onto .idle-track (translate + rotate around 11,12).
         CSS breathe/sway run underneath on .idle-body. The sprite is a flat
         image so per-pupil eye-tracking is not used; the whole-body lean
         toward the cursor still works. */
      .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
      .idle-body {
        transform-origin: 10.5px 21px;
        animation: idle-breathe 3.4s ease-in-out infinite, idle-sway 6s ease-in-out infinite;
      }
      .idle-shadow {
        transform-origin: 10.5px 22.8px;
        animation: idle-shadow-pulse 3.4s ease-in-out infinite;
      }
      @keyframes idle-breathe {
        0%,100% { transform: scaleY(1) translateY(0); }
        50%     { transform: scaleY(0.985) translateY(0.3px); }
      }
      @keyframes idle-sway {
        0%,100% { transform: rotate(0deg); }
        25%     { transform: rotate(0.8deg); }
        75%     { transform: rotate(-0.8deg); }
      }
      @keyframes idle-shadow-pulse {
        0%,100% { transform: scaleX(1); opacity: 0.32; }
        50%     { transform: scaleX(0.95); opacity: 0.25; }
      }
    </style>
  </defs>

  <ellipse class="idle-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="idle-track">
    <g class="idle-body">
      <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
    </g>
  </g>
</svg>
