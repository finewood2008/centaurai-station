<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
    .drag-body { transform-origin:10.5px 21px; animation:drag-stretch .4s ease-in-out infinite alternate; }
    .drag-spark { transform-origin:14.4px 1px; animation:drag-spark-wobble .35s ease-in-out infinite alternate; }
    .drag-shadow { transform-origin:10.5px 22.8px; animation:drag-shadow .4s ease-in-out infinite alternate; }
    @keyframes drag-stretch { from{transform:translateY(-2px) scaleY(1.12) scaleX(.92)} to{transform:translateY(1px) scaleY(.9) scaleX(1.05)} }
    @keyframes drag-spark-wobble { from{transform:rotate(-18deg) translateY(-2px)} to{transform:rotate(5deg) translateY(0)} }
    @keyframes drag-shadow { from{transform:scaleX(.5);opacity:.12} to{transform:scaleX(1.15);opacity:.3} }
  </style></defs>

  <ellipse class="drag-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="drag-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>

  <!-- little spark flying off above the head -->
  <g class="drag-spark">
    <polygon points="14.4,-3 16.2,1 12.6,1" fill="#FF7A1A" stroke="#FF7A1A" stroke-width="0.3"/>
    <rect x="13.9" y="-2" width="1" height="1" fill="#E8631A"/>
  </g>
</svg>
