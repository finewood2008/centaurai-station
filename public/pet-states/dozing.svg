<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
         dozing: a slow sink/settle of the whole sprite + one small drifting z. */
      .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
      .doze-body { transform-origin:10.5px 21px; animation:doze-sink 2.5s ease-in-out infinite; }
      .doze-shadow { transform-origin:10.5px 22.8px; animation:doze-shadow 2.5s ease-in-out infinite; }
      .doze-z1 { animation:doze-z 3.5s ease-in-out infinite; animation-delay:0s; opacity:0; }
      .doze-z2 { animation:doze-z 3.5s ease-in-out infinite; animation-delay:1.2s; opacity:0; }
      @keyframes doze-sink { 0%,100%{transform:scaleY(1) translateY(0)} 50%{transform:scaleY(0.97) translateY(0.6px)} }
      @keyframes doze-shadow { 0%,100%{transform:scaleX(1);opacity:.3} 50%{transform:scaleX(1.05);opacity:.35} }
      @keyframes doze-z { 0%{opacity:0;transform:translate(15px,4px) scale(.4)} 20%{opacity:.7} 80%{opacity:.3} 100%{opacity:0;transform:translate(19px,-5px) scale(.85)} }
    </style>
    <!-- pixel Z shape -->
    <g id="doze-pz"><rect x="0" y="0" width="2.5" height="0.6"/><rect x="1.3" y="0.6" width="0.7" height="0.7"/><rect x="0.5" y="1.3" width="0.7" height="0.7"/><rect x="0" y="2" width="2.5" height="0.6"/></g>
  </defs>
  <!-- floating z (drifts up-right of the head) -->
  <use href="#doze-pz" class="doze-z1" fill="#5B9CF5"/>
  <use href="#doze-pz" class="doze-z2" fill="#2680EB"/>
  <ellipse class="doze-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>
  <g class="doze-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>
</svg>
