<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
       yawning: a small stretch-up bob of the whole sprite (face is baked in). */
    .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
    .yawn-body { transform-origin:10.5px 21px; animation:yawn-stretch 3.5s ease-in-out infinite; }
    .yawn-shadow { transform-origin:10.5px 22.8px; animation:yawn-shadow 3.5s ease-in-out infinite; }
    @keyframes yawn-stretch { 0%,15%{transform:scaleY(1) translateY(0)} 45%{transform:scaleY(1.04) translateY(-0.8px)} 60%{transform:scaleY(1.04) translateY(-0.8px)} 85%,100%{transform:scaleY(1) translateY(0)} }
    @keyframes yawn-shadow { 0%,15%{transform:scaleX(1);opacity:.32} 50%{transform:scaleX(.93);opacity:.26} 85%,100%{transform:scaleX(1);opacity:.32} }
  </style></defs>
  <ellipse class="yawn-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>
  <g class="yawn-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>
</svg>
