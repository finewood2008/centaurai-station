<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
      .err-body {
        transform-origin: 10.5px 12px;
        animation: err-shake 0.38s ease-in-out infinite;
      }
      .err-alarm {
        transform-origin: 18px 0px;
        animation: err-alarm 0.76s ease-in-out infinite;
      }
      .err-bang {
        transform-origin: 17px -2px;
        animation: err-bang 0.38s ease-in-out infinite;
      }
      .err-shadow {
        transform-origin: 10.5px 22.8px;
        animation: err-shadow-shake 0.38s ease-in-out infinite;
      }
      @keyframes err-shake {
        0%,100% { transform: translateX(0) rotate(0deg); }
        20%     { transform: translateX(-2px) rotate(-2.5deg); }
        40%     { transform: translateX(2px) rotate(2.5deg); }
        60%     { transform: translateX(-1.5px) rotate(-1.5deg); }
        80%     { transform: translateX(1.5px) rotate(1.5deg); }
      }
      @keyframes err-alarm {
        0%,100% { transform: translateX(0) translateY(0) rotate(0deg); }
        25%     { transform: translateX(2px) translateY(-3px) rotate(16deg); }
        50%     { transform: translateX(1px) translateY(-2px) rotate(8deg); }
        75%     { transform: translateX(-2px) translateY(-3px) rotate(-12deg); }
      }
      @keyframes err-bang {
        0%,100% { transform: scale(1); }
        50%     { transform: scale(1.25); }
      }
      @keyframes err-shadow-shake {
        0%,100% { transform: scaleX(1); opacity: 0.35; }
        50%     { transform: scaleX(0.95); opacity: 0.2; }
      }
    </style>
  </defs>

  <ellipse class="err-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="err-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>

  <!-- alarmed spark flying off above-right of the head -->
  <g class="err-alarm">
    <polygon points="18,-3 20,1.4 16,1.4" fill="#FF7A1A"/>
    <rect x="17.5" y="-2" width="1" height="1" fill="#E8631A"/>
  </g>

  <!-- red "!" up-right of head -->
  <g class="err-bang" fill="#E8362B">
    <rect x="16" y="-4" width="2" height="4.4" rx="1"/>
    <rect x="16" y="1" width="2" height="2" rx="1"/>
  </g>

  <!-- sweat drop beside the head -->
  <path d="M9 1.2 Q9.9 2.6 9 3.3 Q8.1 2.6 9 1.2 Z" fill="#5B9CF5"/>
</svg>
