<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
         sleeping: a gentle sink/settle (slight scaleY down + lower) + floating
         zzz pixels drifting up-right from the head. */
      .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
      .sleep-body {
        transform-origin: 10.5px 21px;
        animation: sleep-settle 4s ease-in-out infinite;
      }
      .sleeping-shadow {
        transform-origin: 10.5px 22.8px;
        animation: sleeping-shadow-pulse 4s ease-in-out infinite;
      }
      .sleep-z1 { animation: sleep-zzz1 5s ease-in-out infinite; animation-delay: 0s; opacity: 0; }
      .sleep-z2 { animation: sleep-zzz2 5s ease-in-out infinite; animation-delay: 1.6s; opacity: 0; }
      .sleep-z3 { animation: sleep-zzz3 5s ease-in-out infinite; animation-delay: 3.2s; opacity: 0; }
      @keyframes sleep-settle {
        0%,100% { transform: scaleY(1) translateY(0); }
        40%,60% { transform: scaleY(0.965) translateY(0.7px); }
      }
      @keyframes sleeping-shadow-pulse {
        0%,100% { transform: scaleX(1); opacity: 0.35; }
        40%,60% { transform: scaleX(1.08); opacity: 0.28; }
      }
      @keyframes sleep-zzz1 {
        0%   { opacity:0; transform: translate(15px,3px) scale(0.5); }
        15%  { opacity:0.9; }
        80%  { opacity:0.5; }
        100% { opacity:0; transform: translate(19px,-5px) scale(0.9); }
      }
      @keyframes sleep-zzz2 {
        0%   { opacity:0; transform: translate(16px,1px) scale(0.4); }
        15%  { opacity:0.85; }
        80%  { opacity:0.45; }
        100% { opacity:0; transform: translate(21px,-7px) scale(0.8); }
      }
      @keyframes sleep-zzz3 {
        0%   { opacity:0; transform: translate(14px,5px) scale(0.35); }
        15%  { opacity:0.8; }
        80%  { opacity:0.4; }
        100% { opacity:0; transform: translate(18px,-3px) scale(0.7); }
      }
    </style>
    <!-- pixel Z shape -->
    <g id="sleep-pz">
      <rect x="0" y="0" width="3" height="0.7"/>
      <rect x="1.6" y="0.7" width="0.8" height="0.8"/>
      <rect x="0.7" y="1.5" width="0.8" height="0.8"/>
      <rect x="0" y="2.3" width="3" height="0.7"/>
    </g>
  </defs>
  <!-- floating zzz -->
  <use href="#sleep-pz" class="sleep-z1" fill="#5B9CF5"/>
  <use href="#sleep-pz" class="sleep-z2" fill="#2680EB"/>
  <use href="#sleep-pz" class="sleep-z3" fill="#1B57C0"/>

  <!-- shadow -->
  <ellipse class="sleeping-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="sleep-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>
</svg>
