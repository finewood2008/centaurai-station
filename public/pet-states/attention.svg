<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
       attention: whole-sprite alert bounce (pivot at hooves) + a pulsing red
       "!" up-and-right of the head + popping sparks. Face baked in; mood =
       bounce + "!" prop. */
    .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
    .attn-body { transform-origin:10.5px 21px; animation:attn-nod 1.5s ease-in-out infinite; }
    .attn-shadow { transform-origin:10.5px 22.8px; animation:attn-shadow 1.5s ease-in-out infinite; }
    .attn-spark { opacity:0; }
    .attn-sp1 { animation:attn-spark-pop 1.5s ease-out infinite; animation-delay:0s; }
    .attn-sp2 { animation:attn-spark-pop 1.5s ease-out infinite; animation-delay:.5s; }
    .attn-excl { transform-origin:21px 0px; animation:attn-excl-pulse 0.75s ease-in-out infinite; }
    @keyframes attn-nod { 0%,100%{transform:translateY(0) scaleY(1)} 35%{transform:translateY(-2px) scaleY(1.03)} 65%{transform:translateY(0) scaleY(.98)} }
    @keyframes attn-shadow { 0%,100%{transform:scaleX(1);opacity:.32} 35%{transform:scaleX(.9);opacity:.25} }
    @keyframes attn-spark-pop { 0%{opacity:0;transform:scale(0)} 20%{opacity:1;transform:scale(1.2)} 60%{opacity:.8;transform:scale(1)} 100%{opacity:0;transform:scale(.5) translateY(-3px)} }
    @keyframes attn-excl-pulse { 0%,100%{transform:scale(1) translateY(0)} 50%{transform:scale(1.18) translateY(-0.6px)} }
  </style></defs>
  <g class="attn-spark attn-sp1" fill="#e8714a"><rect x="22" y="6" width="1.5" height="1.5" rx="0.4"/></g>
  <g class="attn-spark attn-sp2" fill="#FF9F3F"><rect x="2" y="5" width="1.2" height="1.2" rx="0.3"/></g>
  <ellipse class="attn-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>
  <g class="attn-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>

  <!-- "!" exclamation — alert prop up-and-right of the head -->
  <g class="attn-excl">
    <rect x="20.2" y="-3.4" width="1.7" height="3.4" rx="0.6" fill="#FF3B30"/>
    <rect x="20.2" y="0.8"  width="1.7" height="1.7" rx="0.6" fill="#FF3B30"/>
  </g>
</svg>
