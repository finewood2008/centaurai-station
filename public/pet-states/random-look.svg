<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
       random-look: gentle idle sway/glance of the whole sprite. */
    .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
    .look-body { transform-origin:10.5px 12px; animation:look-sway 4s ease-in-out infinite; }
    .look-shadow { transform-origin:10.5px 22.8px; animation:look-shadow 4s ease-in-out infinite; }
    @keyframes look-sway { 0%,100%{transform:rotate(0) translateX(0)} 25%{transform:rotate(2.2deg) translateX(0.5px)} 75%{transform:rotate(-2.2deg) translateX(-0.5px)} }
    @keyframes look-shadow { 0%,100%{transform:scaleX(1);opacity:.32} 25%{transform:scaleX(.95) translateX(0.6px);opacity:.27} 75%{transform:scaleX(.95) translateX(-0.6px);opacity:.27} }
  </style></defs>
  <ellipse class="look-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>
  <g class="look-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>
</svg>
