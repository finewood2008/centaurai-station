<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
         done: whole-sprite happy jump (pivot at hooves) + flashing sparkles +
         a green-check bubble that pops in up-and-right of the head to carry the
         "task completed" signal. Face is baked in; mood = jump + props. */
      .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
      .done-body {
        transform-origin: 10.5px 21px;
        animation: done-jump 1s ease-in-out infinite;
      }
      .done-shadow {
        transform-origin: 10.5px 22.8px;
        animation: done-shadow 1s ease-in-out infinite;
      }
      .done-spark { opacity: 0; }
      .done-sp1 { animation: done-spark-flash 1.5s step-end infinite; animation-delay: 0s; }
      .done-sp2 { animation: done-spark-flash 1.5s step-end infinite; animation-delay: 0.5s; }
      .done-sp3 { animation: done-spark-flash 1.5s step-end infinite; animation-delay: 1s; }
      .done-sp4 { animation: done-spark-flash 1.5s step-end infinite; animation-delay: 0.75s; }

      .done-bubble {
        transform-origin: 19px 0px;
        transform: scale(0);
        animation: done-bubble-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s forwards;
      }
      .done-chk {
        stroke-dasharray: 8;
        stroke-dashoffset: 8;
        animation: done-chk-draw 0.25s ease-out 0.5s forwards;
      }

      @keyframes done-jump {
        0%,100% { transform: translateY(0) scaleY(1); }
        12%     { transform: translateY(0) scaleY(0.9); }
        30%     { transform: translateY(-6px) scaleY(1.05); }
        50%     { transform: translateY(-7px) scaleY(1); }
        70%     { transform: translateY(-6px) scaleY(1.05); }
        88%     { transform: translateY(0) scaleY(0.9); }
      }
      @keyframes done-shadow {
        0%,100% { transform: scaleX(1); opacity: 0.32; }
        30%,70% { transform: scaleX(0.4); opacity: 0.08; }
      }
      @keyframes done-spark-flash {
        0%  { opacity: 0; }
        10% { opacity: 1; }
        30% { opacity: 0; }
        100%{ opacity: 0; }
      }
      @keyframes done-bubble-pop {
        0%   { transform: scale(0); }
        60%  { transform: scale(1.2); }
        100% { transform: scale(1); }
      }
      @keyframes done-chk-draw {
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- === sparkle layer === -->
  <g class="done-spark done-sp1" fill="#FFD700">
    <rect x="3" y="4" width="1" height="1"/>
    <rect x="2" y="5" width="3" height="0.5"/>
    <rect x="3" y="6" width="1" height="1"/>
  </g>
  <g class="done-spark done-sp2" fill="#FF9F3F">
    <rect x="20" y="-2" width="1" height="1"/>
    <rect x="19" y="-1" width="3" height="0.5"/>
    <rect x="20" y="0" width="1" height="1"/>
  </g>
  <g class="done-spark done-sp3" fill="#FFF59D">
    <rect x="21" y="13" width="1" height="1"/>
    <rect x="20" y="14" width="3" height="0.5"/>
    <rect x="21" y="15" width="1" height="1"/>
  </g>
  <g class="done-spark done-sp4" fill="#FFB3C6">
    <rect x="0" y="10" width="1" height="1"/>
    <rect x="-1" y="11" width="3" height="0.5"/>
    <rect x="0" y="12" width="1" height="1"/>
  </g>

  <ellipse class="done-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="done-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>

    <!-- green-check bubble — up-and-right of the head -->
    <g class="done-bubble">
      <circle cx="20" cy="-1" r="3.8" fill="#ffffff" stroke="#d8dde8" stroke-width="0.4"/>
      <path d="M17 0.7 L18.5 -0.5 L18.5 1.9 Z" fill="#ffffff" stroke="#d8dde8" stroke-width="0.4" stroke-linejoin="round"/>
      <rect x="18.3" y="-0.3" width="0.6" height="1.6" fill="#ffffff"/>
      <!-- Green check -->
      <path class="done-chk"
            d="M18 -1 L19.5 0.5 L22 -2.5"
            stroke="#22C55E" stroke-width="1.4"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
</svg>
