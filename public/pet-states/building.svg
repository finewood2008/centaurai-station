<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
       building: the whole sprite bobs while a spinning gear, a small block
       and a hammer float near the head/hands and sparks fly. The sprite is a
       fixed pose, so the tools are floating props, not held. */
    .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
    .bd-body {
      transform-origin: 10.5px 12px;
      animation: bd-bounce 0.55s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
    }
    .bd-gear {
      transform-origin: 18px 3px;
      animation: bd-spin 2s linear infinite;
    }
    .bd-hammer {
      transform-origin: 16px 9px;
      animation: bd-hammer 0.55s ease-in-out infinite alternate;
    }
    .bd-spark1 { animation: bd-spark 1s ease-out infinite; animation-delay: 0s; }
    .bd-spark2 { animation: bd-spark 1s ease-out infinite; animation-delay: 0.33s; }
    .bd-spark3 { animation: bd-spark 1s ease-out infinite; animation-delay: 0.66s; }
    .bd-shadow {
      transform-origin: 10.5px 22.8px;
      animation: bd-shadow 0.55s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
    }
    @keyframes bd-bounce {
      0%,100% { transform: translateY(0) scaleY(1) scaleX(1); }
      30%     { transform: translateY(-2px) scaleY(1.04) scaleX(0.97); }
      60%     { transform: translateY(1px) scaleY(0.96) scaleX(1.03); }
    }
    @keyframes bd-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes bd-hammer {
      from { transform: rotate(-38deg); }
      to   { transform: rotate(14deg); }
    }
    @keyframes bd-spark {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(3px,-6px) scale(0.2); opacity: 0; }
    }
    @keyframes bd-shadow {
      0%,100% { transform: scaleX(1); opacity: 0.3; }
      30%     { transform: scaleX(0.85); opacity: 0.2; }
      60%     { transform: scaleX(1.08); opacity: 0.34; }
    }
  </style></defs>

  <ellipse class="bd-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="bd-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>

  <!-- 齿轮（头部右上方旋转） -->
  <g class="bd-gear">
    <circle cx="18" cy="3" r="2.6" fill="none" stroke="#ffc94d" stroke-width="1.1"/>
    <circle cx="18" cy="3" r="1" fill="#ffc94d"/>
    <rect x="17.4" y="-0.1" width="1.2" height="1.1" rx="0.3" fill="#ffc94d"/>
    <rect x="17.4" y="5" width="1.2" height="1.1" rx="0.3" fill="#ffc94d"/>
    <rect x="14.9" y="2.4" width="1.1" height="1.2" rx="0.3" fill="#ffc94d"/>
    <rect x="20" y="2.4" width="1.1" height="1.2" rx="0.3" fill="#ffc94d"/>
  </g>

  <!-- 蓝色积木（手部附近漂浮） -->
  <rect x="13.4" y="8.2" width="3.4" height="3.4" rx="0.7" fill="#7c91e8"/>
  <rect x="13.4" y="8.2" width="3.4" height="3.4" rx="0.7" fill="none" stroke="#5c71c8" stroke-width="0.4"/>

  <!-- 锤子（挥动） -->
  <g class="bd-hammer">
    <!-- 锤柄 -->
    <rect x="15.5" y="6" width="1" height="5" rx="0.5" fill="#8a6a3a"/>
    <!-- 锤头 -->
    <rect x="13.8" y="4.4" width="4.4" height="2.2" rx="0.5" fill="#9aa3b5"/>
    <rect x="13.8" y="4.4" width="4.4" height="0.8" rx="0.4" fill="#c0c8d8"/>
  </g>

  <!-- 火花（积木处） -->
  <rect class="bd-spark1" x="16.5" y="9.5" width="1" height="1" rx="0.3" fill="#e8714a"/>
  <rect class="bd-spark2" x="18" y="10" width="0.8" height="0.8" rx="0.2" fill="#FF9500"/>
  <rect class="bd-spark3" x="15.5" y="9.8" width="0.7" height="0.7" rx="0.2" fill="#e8714a"/>
</svg>
