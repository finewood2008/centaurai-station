<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
    .poke-r-body { transform-origin:10.5px 21px; animation:poke-r-tilt .6s cubic-bezier(.34,1.56,.64,1) forwards; }
    .poke-r-shadow { transform-origin:10.5px 22.8px; animation:poke-r-shadow-pulse 3.2s ease-in-out infinite; }
    @keyframes poke-r-tilt { 0%{transform:rotate(0) translateX(0)} 40%{transform:rotate(-12deg) translateX(-2px)} 100%{transform:rotate(-8deg) translateX(-1.5px)} }
    @keyframes poke-r-shadow-pulse { 0%,100%{transform:scaleX(1);opacity:0.35} 50%{transform:scaleX(0.96);opacity:0.28} }
  </style></defs>

  <ellipse class="poke-r-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="poke-r-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>
</svg>
