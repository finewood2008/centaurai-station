<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
       random-read: gentle reading tilt + a small scroll/tablet floating in front of the torso/hands. */
    .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
    .read-body { transform-origin:10.5px 12px; animation:read-tilt 5s ease-in-out infinite; }
    .read-shadow { transform-origin:10.5px 22.8px; animation:read-shadow 5s ease-in-out infinite; }
    .read-scroll { transform-origin:14.5px 10.5px; animation:read-float 5s ease-in-out infinite; }
    .read-page { animation:read-flip 2.5s ease-in-out infinite; }
    @keyframes read-tilt { 0%,100%{transform:rotate(0) translateY(0)} 50%{transform:rotate(2deg) translateY(0.4px)} }
    @keyframes read-shadow { 0%,100%{transform:scaleX(1);opacity:.3} 50%{transform:scaleX(1.05);opacity:.35} }
    @keyframes read-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-0.5px)} }
    @keyframes read-flip { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(-1)} }
  </style></defs>
  <ellipse class="read-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>
  <g class="read-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>

  <!-- ======== SCROLL / TABLET floating in front of the torso/hands ======== -->
  <g class="read-scroll">
    <!-- open scroll/page -->
    <rect x="11.4" y="8.4" width="6" height="4.4" rx="0.6" fill="#f0ece0"/>
    <rect x="11.2" y="8.4" width="0.9" height="4.4" rx="0.45" fill="#d0c8b0"/>
    <rect x="16.9" y="8.4" width="0.9" height="4.4" rx="0.45" fill="#d0c8b0"/>
    <!-- text lines -->
    <rect x="12.2" y="9.4" width="4.4" height="0.5" rx="0.2" fill="#b0a890" opacity="0.7"/>
    <g class="read-page"><rect x="12.2" y="10.4" width="3.4" height="0.5" rx="0.2" fill="#b0a890" opacity="0.7"/></g>
    <rect x="12.2" y="11.4" width="4" height="0.5" rx="0.2" fill="#b0a890" opacity="0.5"/>
  </g>
</svg>
