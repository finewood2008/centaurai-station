<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
       juggling: the whole sprite does a small lean/bob while 3 colored balls
       cascade in an arc above the head. The sprite is a fixed pose, so the
       balls are floating props, not held. */
    .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
    .jg-body { transform-origin:10.5px 12px; animation:jg-lean .8s ease-in-out infinite; }
    .jg-ba { animation:jg-casc 2.4s ease-in-out infinite; animation-delay:0s; }
    .jg-bb { animation:jg-casc 2.4s ease-in-out infinite; animation-delay:-.8s; }
    .jg-bc { animation:jg-casc 2.4s ease-in-out infinite; animation-delay:-1.6s; }
    .jg-shadow { transform-origin:10.5px 22.8px; animation:jg-shadow .8s ease-in-out infinite; }
    /* 球在头顶上方画弧线（x6→16, y-3→6） */
    @keyframes jg-casc {
      0%  {transform:translate(6.5px,5px) scale(1.05)}
      15% {transform:translate(7.5px,1px) scale(.92)}
      30% {transform:translate(9px,-2px) scale(.8)}
      50% {transform:translate(11px,-4px) scale(.7)}
      70% {transform:translate(13px,-1px) scale(.85)}
      85% {transform:translate(15px,3px) scale(1)}
      100%{transform:translate(16px,5px) scale(1.05)}
    }
    @keyframes jg-lean { 0%{transform:rotate(-3deg) scaleX(1.02)} 50%{transform:rotate(3deg) translateY(-1px) scaleX(.98)} 100%{transform:rotate(-3deg) scaleX(1.02)} }
    @keyframes jg-shadow { 0%,100%{transform:scaleX(1);opacity:.32} 50%{transform:scaleX(.9);opacity:.22} }
  </style></defs>

  <ellipse class="jg-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <!-- 三彩球（cascade 轨迹，错开 0.8s）— 后两球在身体下层 -->
  <!-- 绿球 -->
  <circle class="jg-ba" cx="0" cy="0" r="1.6" fill="#0FDC00"/>
  <!-- 黄球 -->
  <circle class="jg-bb" cx="0" cy="0" r="1.6" fill="#FEBE06"/>

  <g class="jg-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>

  <!-- 粉红球（最上层） -->
  <circle class="jg-bc" cx="0" cy="0" r="1.6" fill="#FE4F4F"/>
</svg>
