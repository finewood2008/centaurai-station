<svg viewBox="-18 -18 58 58" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs><style>
    /* CentaurAI pixel mascot — shared raster sprite (centaur.png).
       carrying: the whole sprite walk-bobs while a box floats in front of the
       torso, bobbing along with it. The sprite is a fixed pose, so the box is
       a floating prop, not held. */
    .pet-img { image-rendering: pixelated; image-rendering: crisp-edges; }
    .carry-body { transform-origin:10.5px 12px; animation:carry-walk .6s ease-in-out infinite; }
    .carry-shadow { transform-origin:10.5px 22.8px; animation:carry-shadow .6s ease-in-out infinite; }
    .carry-box { transform-origin:14px 12px; animation:carry-box-bob .6s ease-in-out infinite; }
    @keyframes carry-walk { 0%,100%{transform:translateX(0) translateY(0) rotate(0)} 25%{transform:translateX(1px) translateY(-1.5px) rotate(2deg)} 75%{transform:translateX(-1px) translateY(-1.5px) rotate(-2deg)} }
    @keyframes carry-shadow { 0%,100%{transform:scaleX(1);opacity:.32} 25%,75%{transform:scaleX(.85);opacity:.22} }
    @keyframes carry-box-bob { 0%,100%{transform:translateY(0) rotate(0)} 25%{transform:translateY(-.5px) rotate(1deg)} 75%{transform:translateY(-.5px) rotate(-1deg)} }
  </style></defs>

  <ellipse class="carry-shadow" cx="10.5" cy="22.8" rx="7.2" ry="0.95" fill="#0a1430"/>

  <g class="carry-body">
    <image class="pet-img" href="centaur.png" x="1.9" y="-1" width="17.15" height="24" preserveAspectRatio="xMidYMax meet"/>
  </g>

  <!-- 箱子在身前（漂浮在躯干前方） -->
  <g class="carry-box">
    <!-- 箱子 -->
    <rect x="11" y="10" width="8" height="5.2" rx="1" fill="#c8a96e"/>
    <rect x="11" y="10" width="8" height="5.2" rx="1" fill="none" stroke="#a08040" stroke-width="0.5"/>
    <!-- 箱子胶带 -->
    <rect x="14.2" y="10" width="1.6" height="5.2" rx="0.3" fill="#e0c070" opacity="0.7"/>
    <!-- 箱子高光 -->
    <rect x="11.8" y="10.7" width="2.4" height="0.7" rx="0.3" fill="white" opacity="0.3"/>
  </g>
</svg>
